name: Brain Brew check

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      BRAINBREW_FLAKE: github:jeprecated/brain-brew/rust-brainbrew
      BRAINBREW_MANIFESTS: brainbrew.yaml brainbrew-hardcore.yaml
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Check external template and style sources
        run: python scripts/check-source-content.py

      - name: Verify Brain Brew workspace
        run: |
          set -euo pipefail
          for manifest in $BRAINBREW_MANIFESTS; do
            nix run "$BRAINBREW_FLAKE" -- verify --manifest "$manifest" --all-targets --media-root media
          done

      - name: Export all CrowdAnki targets
        run: |
          set -euo pipefail
          for manifest in $BRAINBREW_MANIFESTS; do
            nix run "$BRAINBREW_FLAKE" -- targets --manifest "$manifest" | while read -r target; do
              out="build/crowdanki/$target"
              nix run "$BRAINBREW_FLAKE" -- export crowdanki --manifest "$manifest" --target "$target" --out "$out" --media-root media
              test -f "$out/deck.json"
              mkdir -p "$out/media"
              cp media/* "$out/media/"
            done
          done
