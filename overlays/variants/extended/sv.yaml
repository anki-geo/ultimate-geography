id: overlay.variant.extended.sv
kind: extension
deck:
  name:
    intent: override
    value: Ultimate Geography
    expected_base:
      value: 'Ultimate Geography [SV]'
  description:
    intent: override
    value: |
      <a href="https://github.com/anki-geo/ultimate-geography/"><b>FULL DESCRIPTION</b></a> | <a href="https://github.com/anki-geo/ultimate-geography/releases"><b>RELEASE NOTES</b></a> | <a href="https://github.com/anki-geo/ultimate-geography/blob/master/CONTRIBUTING.md"><b>CONTRIBUTING</b></a>
      
      <b>Ultimate Geography v5.3</b> features:
      
      - the world's <a href="https://en.wikipedia.org/wiki/List_of_sovereign_states"><b>205 sovereign states</b></a> (820 cards)
      - <b>59 territories, world regions, and other entities</b> (103 cards)
      - <b>48 oceans and seas</b> (48 cards, maps only)
      - <b>7 continents</b> (7 cards, maps only)
      - for a total of <b>319 unique notes</b>, <b>978 cards</b>, <b>221 flags</b> and <b>319 maps</b>.
      
      The deck is <a href="https://github.com/anki-geo/ultimate-geography#other-languages-and-versions">available</a> in <b>English</b>, <b>German</b>, <b>Spanish</b>, <b>French</b>, <b>Norwegian</b>, <b>Czech</b>, <b>Russian</b>, <b>Dutch</b>, <b>Swedish</b>, <b>Portuguese</b>, <b>Chinese</b> (simplified and traditional), <b>Polish</b>, <b>Italian</b> and <b>Danish</b>. An <a href="https://github.com/anki-geo/ultimate-geography#other-languages-and-versions"><b>extended version</b></a> is also available in each language. To help with memorisation and provide context while learning, some notes include extra information such as similar flags, governance information, alternative country names, etc.
      
      You can use Anki's <a href="https://github.com/anki-geo/ultimate-geography#custom-study">filtered deck feature</a> to focus your study on a subset of the deck, such as sovereign states, a single note template (e.g. map to country), or a specific continent (e.g. Europe).
      
      This deck is <a href="https://github.com/anki-geo/ultimate-geography"><b>maintained on GitHub</b></a>. If you spot a mistake, have a suggestion or want to help, please don't hesitate to <a href="https://github.com/anki-geo/ultimate-geography/issues">open an issue</a>. Want to <b>stay informed of new releases</b>? Watch the GitHub repository or subscribe to the <a href="https://github.com/anki-geo/ultimate-geography/releases.atom">releases feed</a>!
    expected_base:
      value: |
        <a href="https://github.com/anki-geo/ultimate-geography/"><b>FULLSTÄNDIG BESKRIVNING</b></a> | <a href="https://github.com/anki-geo/ultimate-geography/releases"><b>UTGIVNINGSANMÄRKNINGAR</b></a> | <a href="https://github.com/anki-geo/ultimate-geography/blob/master/CONTRIBUTING.md"><b>BIDRA</b></a>
        
        <b>Ultimate Geography v5.3</b> innehåller:
        
        - världens <a href="https://en.wikipedia.org/wiki/List_of_sovereign_states"><b>205 självständiga stater</b></a> (820 kort)
        - <b>59 territorum, världsregioner och andra enheter</b> (103 kort)
        - <b>48 sjöar och hav</b> (48 kort, enbart kartor)
        - <b>7 kontinenter</b> (7 kort, enbart kartor)
        - sammanlagt <b>319 unika noter</b>, <b>978 kort</b>, <b>221 flaggor</b> och <b>319 kartor</b>.
        
        Kortleken finns tillgänglig på fjorton olika språk: <b>engelska</b>, <b>tyska</b>, <b>spanska</b>, <b>franska</b>, <b>norska</b>, <b>tjeckiska</b>, <b>ryska</b>, <b>nederländska</b>, <b>svenska</b>, <b>portugisiska</b>, <b>kinesiska</b>, <b>polska</b>, <b>italienska</b> och <b>danska</b>. För vardera språk finns dessutom en <a href="https://github.com/anki-geo/ultimate-geography#features"><b>utökad version</b></a>.
        
        För att underlätta inlärningen så har vissa kort en extra informationsrad, med exempelvis information om att flaggan på kortet liknar en annan flagga, politisk styrelse eller ett alternativt namn på ett land.
        
        Du kan skapa en <a href="https://github.com/anki-geo/ultimate-geography#custom-study">filtrerad kortlek</a> om du vill fokusera på specifika delar av kortleken. Till exempel kan du på så sätt välja att enbart studera suveräna stater, endast en specifik korttyp (såsom "karta → land") eller en specifik världsdel (till exempel Europa).
        
        Den här kortleken <a href="https://github.com/anki-geo/ultimate-geography"><b>administreras på GitHub</b></a>. Om du upptäcker ett fel, har förslag eller vill hjälpa till, tveka inte att <a href="https://github.com/anki-geo/ultimate-geography/issues">öppna ett ärende</a>. Vill du bli informerad om uppdateringar av kortleken? Bevaka källlkodskatalogen på GitHub eller prenumerera på <a href="https://github.com/anki-geo/ultimate-geography/releases.atom">feeden för utgåvor</a>!
