  description:
    intent: replace
    value: |
      <div dir="rtl">
      
      <a href="https://github.com/anki-geo/ultimate-geography/"><b>תיאור מלא</b></a> | <a href="https://github.com/anki-geo/ultimate-geography/releases"><b>הערות גרסה</b></a> | <a href="https://github.com/anki-geo/ultimate-geography/blob/master/CONTRIBUTING.md"><b>תרומה לפרויקט</b></a>
      
      חפיסת <b>Ultimate Geography v5.3</b> כוללת:
      
      - את <a href="https://en.wikipedia.org/wiki/List_of_sovereign_states"><b>205 המדינות הריבוניות</b></a> בעולם (820 כרטיסים)
      - <b>59 טריטוריות, אזורים גאוגרפיים וישויות אחרות</b> (103 כרטיסים)
      - <b>48 אוקיינוסים וימים</b> (48 כרטיסים, מפות בלבד)
      - <b>7 יבשות</b> (7 כרטיסים, מפות בלבד)
      - בסך הכול <b>319 רשומות ייחודיות</b>, <b>978 כרטיסים</b>, <b>221 דגלים</b> ו-<b>319 מפות</b>.
      
      החפיסה <a href="https://github.com/anki-geo/ultimate-geography#other-languages-and-versions">זמינה</a> ב<b>אנגלית</b>, <b>גרמנית</b>, <b>ספרדית</b>, <b>צרפתית</b>, <b>נורווגית</b>, <b>צ'כית</b>, <b>רוסית</b>, <b>הולנדית</b>, <b>שוודית</b>, <b>פורטוגזית</b>, <b>סינית</b> (מפושטת ומסורתית), <b>פולנית</b>, <b>איטלקית</b>, <b>דנית</b> ו<b>עברית</b>. יש גם <a href="https://github.com/anki-geo/ultimate-geography#other-languages-and-versions"><b>גרסה מורחבת</b></a> בכל שפה. כדי לסייע בשינון ולתת הקשר בזמן הלימוד, חלק מהרשומות כוללות מידע נוסף, כגון דגלים דומים, מידע על מעמד מדיני, שמות חלופיים למדינות ועוד.
      
      אפשר להשתמש ב<a href="https://github.com/anki-geo/ultimate-geography#custom-study">חפיסות מסוננות של Anki</a> כדי להתמקד בחלק מסוים של החפיסה, למשל מדינות ריבוניות, תבנית קלף אחת (כגון מפה למדינה), או יבשת מסוימת (כגון אירופה).
      
      החפיסה <a href="https://github.com/anki-geo/ultimate-geography"><b>מתוחזקת ב-GitHub</b></a>. אם מצאתם טעות, יש לכם הצעה או שאתם רוצים לעזור, אפשר <a href="https://github.com/anki-geo/ultimate-geography/issues">לפתוח דיווח</a>. רוצים <b>להתעדכן בגרסאות חדשות</b>? עקבו אחרי המאגר ב-GitHub או הירשמו ל<a href="https://github.com/anki-geo/ultimate-geography/releases.atom">פיד הגרסאות</a>!
      
      </div>
    expected_base:
      value: |
        <a href="https://github.com/anki-geo/ultimate-geography/"><b>FULL DESCRIPTION</b></a> | <a href="https://github.com/anki-geo/ultimate-geography/releases"><b>RELEASE NOTES</b></a> | <a href="https://github.com/anki-geo/ultimate-geography/blob/master/CONTRIBUTING.md"><b>CONTRIBUTING</b></a>
        
        <b>Ultimate Geography v5.3</b> features:
        
        - the world's <a href="https://en.wikipedia.org/wiki/List_of_sovereign_states"><b>205 sovereign states</b></a> (820 cards)
        - <b>59 territories, world regions, and other entities</b> (103 cards)
        - <b>48 oceans and seas</b> (48 cards, maps only)
        - <b>7 continents</b> (7 cards, maps only)
        - for a total of <b>319 unique notes</b>, <b>978 cards</b>, <b>221 flags</b> and <b>319 maps</b>.
        
        The deck is <a href="https://github.com/anki-geo/ultimate-geography#other-languages-and-versions">available</a> in <b>English</b>, <b>German</b>, <b>Spanish</b>, <b>French</b>, <b>Norwegian</b>, <b>Czech</b>, <b>Russian</b>, <b>Dutch</b>, <b>Swedish</b>, <b>Portuguese</b>, <b>Chinese</b> (simplified and traditional), <b>Polish</b>, <b>Italian</b> and <b>Danish</b>. An <a href="https://github.com/anki-geo/ultimate-geography#other-languages-and-versions"><b>extended version</b></a> is also available in each language. To help with memorisation and provide context while learning, some notes include extra information such as similar flags, governance information, alternative country names, etc.
        
        You can use Anki's <a href="https://github.com/anki-geo/ultimate-geography#custom-study">filtered deck feature</a> to focus your study on a subset of the deck, such as sovereign states, a single note template (e.g. map to country), or a specific continent (e.g. Europe).
        
        This deck is <a href="https://github.com/anki-geo/ultimate-geography"><b>maintained on GitHub</b></a>. If you spot a mistake, have a suggestion or want to help, please don't hesitate to <a href="https://github.com/anki-geo/ultimate-geography/issues">open an issue</a>. Want to <b>stay informed of new releases</b>? Watch the GitHub repository or subscribe to the <a href="https://github.com/anki-geo/ultimate-geography/releases.atom">releases feed</a>!
