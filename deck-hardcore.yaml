deck:
  id: deck.hardcore-geography
  name: Hardcore Geography
  description: |
    <a href="https://github.com/anki-geo/hardcore-geography/"><b>FULL DESCRIPTION</b></a> | <a href="https://github.com/anki-geo/hardcore-geography/releases"><b>RELEASE NOTES</b></a> | <a href="https://github.com/anki-geo/hardcore-geography/blob/master/CONTRIBUTING.md"><b>CONTRIBUTING</b></a>
    
    <b>Hardcore Geography</b> is a companion add-on for Ultimate Geography. It contains supplemental territories and region cards that can be installed alongside standard Ultimate Geography without taking ownership of UG notes.
  adapter_ids:
    crowdanki:deck_config_name: Ultimate Geography
    crowdanki:deck_config_uuid: 43d37fac-9a65-11e8-9cc5-a0481cc15658
    crowdanki:uuid: 17a30e4f-2229-4ccc-8a6c-7d1ee559ce51
note_types:
  note-type.ultimate-geography:
    name: '${note-type.name}${variant.name-suffix}'
    variables:
      label.capital: Capital
      label.capital-hint.answer: 'Hint: {{Capital hint}}'
      label.capital-hint.question: 'Hint: {{Capital hint}}'
      label.flag: Flag
      label.location: Location
      note-type.name: Ultimate Geography
      sentence.flag-similar: 'Flag similar to {{Flag similarity}}.'
      text.direction: ltr
      variant.name-suffix: ''
    field_order:
      - field.country
      - field.country-info
      - field.capital
      - field.capital-info
      - field.capital-hint
      - field.flag
      - field.flag-similarity
      - field.map
    fields:
      field.capital:
        name: Capital
      field.capital-hint:
        name: Capital hint
      field.capital-info:
        name: Capital info
      field.country:
        name: Country
      field.country-info:
        name: Country info
      field.flag:
        name: Flag
      field.flag-similarity:
        name: Flag similarity
      field.map:
        name: Map
    card_template_order:
      - template.country-capital
      - template.capital-country
      - template.flag-country
      - template.map-country
    card_templates:
      template.capital-country:
        name: Capital - Country
        question_format: |-
          {{#Capital}}
            <div class="value value--top">?</div>
          
            <hr>
          
            <div class="type">${label.capital}</div>
            <div class="value">{{Capital}}</div>
            {{#Capital hint}}<div class="info">${label.capital-hint.question}</div>{{/Capital hint}}
          {{/Capital}}
        answer_format: |
          <div id=answer class="value value--top">{{Country}}</div>
          {{#Country info}}<div class="info">{{Country info}}</div>{{/Country info}}
          
          <hr>
          
          <div class="type">${label.capital}</div>
          <div class="value">{{Capital}}</div>
          {{#Capital hint}}<div class="info">${label.capital-hint.answer}</div>{{/Capital hint}}
          {{#Capital info}}<div class="info">{{Capital info}}</div>{{/Capital info}}
        adapter_ids: {}
      template.country-capital:
        name: Country - Capital
        question_format: |-
          {{#Capital}}
            <div class="value value--top">{{Country}}</div>
            {{#Country info}}<div class="info">{{Country info}}</div>{{/Country info}}
          
            <hr>
          
            <div class="type">${label.capital}</div>
            <div class="value">?</div>
          {{/Capital}}
        answer_format: |
          <div class="value value--top">{{Country}}</div>
          {{#Country info}}<div class="info">{{Country info}}</div>{{/Country info}}
          
          <hr id=answer>
          
          <div class="type">${label.capital}</div>
          <div class="value">{{Capital}}</div>
          {{#Capital info}}<div class="info">{{Capital info}}</div>{{/Capital info}}
        adapter_ids: {}
      template.flag-country:
        name: Flag - Country
        question_format: |-
          {{#Flag}}
            <div class="value value--top">?</div>
          
            <hr>
          
            <div class="type">${label.flag}</div>
            <div class="value value--image value--front">{{Flag}}</div>
          {{/Flag}}
        answer_format: |
          <div id=answer class="value value--top">{{Country}}</div>
          {{#Country info}}<div class="info">{{Country info}}</div>{{/Country info}}
          
          <hr>
          
          <div class="type">${label.flag}</div>
          <div class="value value--image value--back">{{Flag}}</div>
          {{#Flag similarity}}<div class="info">${sentence.flag-similar}</div>{{/Flag similarity}}
        adapter_ids: {}
      template.map-country:
        name: Map - Country
        question_format: |-
          {{#Map}}
            <div class="value value--top">?</div>
          
            <hr>
          
            <div class="type">${label.location}</div>
            <div class="value value--image">{{Map}}</div>
          {{/Map}}
        answer_format: |
          <div id=answer class="value value--top">{{Country}}</div>
          {{#Country info}}<div class="info">{{Country info}}</div>{{/Country info}}
          
          <hr>
          
          <div class="type">${label.location}</div>
          <div class="value value--image">{{Map}}</div>
        adapter_ids: {}
    styling: |
      .card {
        padding: 1em 0;
        background-color: white;
        color: black;
        direction: ${text.direction};
        font-family: Verdana;
        font-size: 16px;
        text-align: center;
      }
      
      .type {
        margin-bottom: 0.25em;
        color: #333;
        font-size: 70%;
        font-weight: bold;
        text-transform: uppercase;
      }
      
      .info {
        max-width: 30em;
        margin: 0.75em auto;
        color: #333;
        font-size: 90%;
        font-style: italic;
      }
      
      .value {
        font-size: 150%;
      }
      
      .value--top {
        margin-top: 1em;
      }
      
      .value--image {
        margin-top: 0.75em;
      }
      
      .value--map {
        width: 90%;
        height: 65vh;
        margin: 2em auto 0 auto;
      }
      
      .value > img,
      .value > .placeholder {
        max-width: 100%;
        height: auto;
      }
      
      /**
       * Apply shadow to images, notably to bring out white areas on flags.
       * Ignore images with non-rectangular outlines (e.g. flag of Nepal).
       */
      .value > img:not([src*="-nobox"]) {
        box-shadow: 0 1px 4px 1px rgba(0, 0, 0, 0.2);
      }
      
      /**
       * Some flags (e.g. Guam's) contain identifying words that can give away the answer.
       * If a blurred version is available, show it on the front but not on the back.
       */
      .value--front > img[src*="-blur"] + img {
        display: none;
      }
      
      .value--back > img[src*="-blur"] {
        display: none;
      }
      
      /**
       * Placeholder SVG to hint at the type of answer that is expected.
       * Used on "Country - Flag" and "Country - Map" templates.
       */
      .placeholder {
        color: #333;
      }
      
      .placeholder > path {
        fill: none;
        stroke: currentColor;
        stroke-width: 1;
      }
      
      .night_mode .info,
      .night_mode .type,
      .night_mode .placeholder,
      .nightMode .info,
      .nightMode .type,
      .nightMode .placeholder {
        color: #ccc;
      }
      
      /**
       * Apply shadow to images, to bring out black areas on flags, in night
         mode.
       */
      .nightMode .value > img:not([src*="-nobox"]),
      .night_mode .value > img:not([src*="-nobox"]) {
        box-shadow: 0 0 4px 1px rgba(54, 54, 54, 0.9);
      }
      
      hr {
        margin: 1.5em 0;
      }
    adapter_ids:
      crowdanki:uuid: 43e2586a-9a65-11e8-a777-a0481cc15658
notes:
media:
tombstones: []
